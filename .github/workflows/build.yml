name: Build and Release DOS Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We need to explicitly grant write permissions so the workflow can create a release
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow

    - name: Pack Game Assets
      run: |
        echo "Running packer.py to generate /content directory..."
        python packer.py

    - name: Setup Open Watcom V2
      uses: open-watcom/setup-watcom@v1
      with:
        version: "2.0"
        target: "dos"

    - name: Build Game (game.exe)
      run: |
        chmod +x build.sh
        ./build.sh

    - name: Get Current Date and Time
      id: datetime
      # Formats date as DDMMYYYY-HHMM and saves it to the environment
      run: echo "TIMESTAMP=$(date +'%d%m%Y-%H%M')" >> $GITHUB_ENV

    - name: Zip Files for Release
      run: |
        echo "Zipping game.exe and content/..."
        zip -r DOSTCG-${{ env.TIMESTAMP }}.zip game.exe content/

    - name: Create GitHub Release
      # Only create a release when code is pushed/merged to main, not on PRs
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.TIMESTAMP }}
        name: Release ${{ env.TIMESTAMP }}
        files: DOSTCG-${{ env.TIMESTAMP }}.zip
        body: |
          Automated build generated on push to main.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}